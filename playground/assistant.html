<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediAssist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════
       Design system — clinical precision × warmth
       ═══════════════════════════════════════════ */
    :root {
      --navy:        #0d1b2a;
      --navy-2:      #132236;
      --navy-3:      #1a2e45;
      --navy-4:      #1f3850;
      --amber:       #e8a030;
      --amber-glow:  rgba(232,160,48,0.18);
      --slate-1:     #e8edf2;
      --slate-2:     #bcc8d6;
      --slate-3:     #2e4057;
      --slate-6:     #8fa4b8;
      --green:       #3dd68c;
      --red:         #f4655a;
      --red-dim:     rgba(244,101,90,0.15);
      --font-display:"DM Serif Display", Georgia, serif;
      --font-body:   "DM Sans", system-ui, sans-serif;
      --radius:      12px;
      --radius-lg:   18px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      color: var(--slate-1);
      background: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 860px;
      margin: 0 auto;
      background: var(--navy);
      background-image: repeating-linear-gradient(
        135deg, transparent, transparent 40px,
        rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px
      );
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: var(--navy-2);
      gap: 16px;
      flex-shrink: 0;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon svg { width: 36px; height: 36px; filter: drop-shadow(0 2px 8px var(--amber-glow)); }
    .brand-name { font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: -0.3px; line-height: 1.2; }
    .brand-sub  { font-size: 11.5px; color: var(--slate-6); font-weight: 300; }
    .header-controls { display: flex; align-items: center; gap: 12px; }

    /* ── Language toggle ── */
    .lang-toggle {
      display: flex;
      background: var(--navy-3);
      border-radius: var(--radius-pill);
      padding: 3px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .lang-btn {
      background: none; border: none;
      color: var(--slate-6);
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      letter-spacing: 0.5px; padding: 5px 14px;
      border-radius: var(--radius-pill); cursor: pointer;
      transition: all 0.2s ease;
    }
    .lang-btn.active { background: var(--amber); color: var(--navy); font-weight: 600; }
    .lang-btn:not(.active):hover { color: var(--slate-1); }

    /* ── Status pill ── */
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11.5px; color: var(--slate-6);
      padding: 5px 12px;
      background: var(--navy-3);
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap; transition: color 0.3s;
    }
    .status-pip {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--slate-6); flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-pill.connected   { color: var(--green); }
    .status-pill.connected   .status-pip { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-pill.connecting  .status-pip { background: var(--amber); animation: blink 1s infinite; }
    .status-pill.error       { color: var(--red); }
    .status-pill.error       .status-pip { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Messages area ── */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--navy-4); border-radius: 4px; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 12px; padding: 48px 24px;
      animation: fadeIn 0.4s ease;
    }
    .empty-state svg { width: 72px; height: 72px; opacity: 0.7; }
    .empty-title { font-family: var(--font-display); font-size: 26px; font-weight: 400; letter-spacing: -0.3px; }
    .empty-desc  { font-size: 14px; color: var(--slate-6); max-width: 360px; font-weight: 300; }
    .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      background: var(--navy-3);
      border: 1px solid rgba(232,160,48,0.25);
      color: var(--amber);
      font-family: var(--font-body); font-size: 13px;
      padding: 8px 16px; border-radius: var(--radius-pill);
      cursor: pointer; transition: all 0.18s ease;
    }
    .chip:hover { background: var(--amber-glow); border-color: var(--amber); transform: translateY(-1px); }

    /* ── Message bubbles ── */
    .bubble-row {
      display: flex; align-items: flex-end; gap: 10px;
      animation: slideUp 0.22s ease;
    }
    .bubble-row.user      { flex-direction: row-reverse; }
    .bubble-row.assistant { flex-direction: row; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .bubble-avatar { flex-shrink: 0; width: 32px; height: 32px; }
    .bubble-avatar svg { width: 32px; height: 32px; }

    .bubble {
      max-width: 68%; padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 14.5px; line-height: 1.6; position: relative;
    }
    .bubble.user      { background: var(--amber); color: var(--navy); border-bottom-right-radius: 4px; }
    .bubble.assistant { background: var(--navy-3); color: var(--slate-1); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.06); }
    .bubble.error     { background: var(--red-dim); border-color: rgba(244,101,90,0.3); }

    .bubble p { white-space: pre-wrap; word-break: break-word; }

    .bubble-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .bubble-time { font-size: 11px; opacity: 0.5; margin-left: auto; white-space: nowrap; }
    .tool-tag {
      font-size: 10px; background: rgba(232,160,48,0.12); color: var(--amber);
      border: 1px solid rgba(232,160,48,0.2); padding: 2px 7px;
      border-radius: var(--radius-pill); text-transform: capitalize;
    }

    /* ── Audio bubble ── */
    .audio-row { display: flex; align-items: center; gap: 10px; }
    .audio-play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--amber); color: var(--navy);
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: transform 0.15s ease; flex-shrink: 0;
    }
    .bubble.user .audio-play-btn { background: var(--navy); color: var(--amber); }
    .audio-play-btn:hover { transform: scale(1.08); }
    .audio-play-btn svg { width: 14px; height: 14px; }
    .audio-waveform { display: flex; align-items: center; gap: 2.5px; height: 28px; }
    .waveform-bar {
      display: block; width: 3px; border-radius: 2px;
      background: currentColor; opacity: 0.5;
      animation: wave 1.2s ease-in-out infinite;
      animation-delay: calc(var(--i) * 0.07s); height: 6px;
    }
    @keyframes wave { 0%,100%{height:4px;opacity:0.3} 50%{height:20px;opacity:0.8} }
    .bubble-transcript { font-size: 12.5px; opacity: 0.7; font-style: italic; margin-top: 4px; }

    /* ── Thinking bubble ── */
    .thinking-bubble {
      display: flex; align-items: flex-end; gap: 10px;
      animation: slideUp 0.22s ease;
    }
    .thinking-dots {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 18px;
      background: var(--navy-3); border-radius: var(--radius-lg);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .thinking-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--slate-6);
      animation: thinking 1.4s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinking { 0%,80%,100%{transform:scale(0.8);opacity:0.4} 40%{transform:scale(1.2);opacity:1} }

    /* ── Input bar ── */
    .input-bar {
      display: flex; align-items: flex-end; gap: 12px;
      padding: 16px 20px;
      background: var(--navy-2);
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; display: flex; align-items: flex-end; gap: 10px;
      background: var(--navy-3);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg); padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(232,160,48,0.4);
      box-shadow: 0 0 0 3px var(--amber-glow);
    }
    #text-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--slate-1); font-family: var(--font-body);
      font-size: 14.5px; line-height: 1.5;
      resize: none; min-height: 24px; max-height: 140px; overflow-y: auto;
    }
    #text-input::placeholder { color: var(--slate-6); }
    #text-input:disabled { opacity: 0.4; cursor: not-allowed; }
    #text-input::-webkit-scrollbar { width: 3px; }
    #text-input::-webkit-scrollbar-thumb { background: var(--navy-4); border-radius: 3px; }

    .send-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--amber); color: var(--navy);
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.18s ease; flex-shrink: 0;
    }
    .send-btn svg { width: 16px; height: 16px; }
    .send-btn:hover:not(:disabled) { background: #f0b040; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; background: var(--slate-3); color: var(--slate-6); }

    /* ── Voice button ── */
    .voice-btn-wrap {
      position: relative; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex-shrink: 0; gap: 6px;
    }
    .voice-ring {
      position: absolute; inset: -10px; border-radius: 50%;
      background: var(--red); pointer-events: none; opacity: 0;
      will-change: transform, opacity;
    }
    .voice-ring-idle {
      position: absolute; inset: -5px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.08); pointer-events: none;
    }
    #voice-btn {
      position: relative; width: 52px; height: 52px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      background: var(--navy-3); color: var(--slate-2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      z-index: 1; flex-shrink: 0;
    }
    #voice-btn svg { width: 20px; height: 20px; }
    #voice-btn:hover:not(:disabled) { background: var(--navy-4); border-color: var(--amber); color: var(--amber); }
    #voice-btn.recording { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    #voice-btn.processing { border-color: var(--amber); color: var(--amber); }
    #voice-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .rec-bars { display: flex; align-items: center; gap: 2.5px; height: 20px; }
    .rec-bar {
      display: block; width: 3px; border-radius: 2px;
      background: var(--red);
      animation: recBar 0.9s ease-in-out infinite alternate;
      animation-delay: calc(var(--bi) * 0.13s); min-height: 3px;
    }
    @keyframes recBar { from{height:3px;opacity:0.5} to{height:18px;opacity:1} }

    .voice-rec-label {
      display: none; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 600; letter-spacing: 1px;
      color: var(--red); text-transform: uppercase; white-space: nowrap;
    }
    .voice-rec-label.visible { display: flex; }
    .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; }

    .voice-cancel-btn {
      position: absolute; top: -8px; right: -8px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--navy-4); border: 1px solid rgba(255,255,255,0.12);
      color: var(--slate-6); font-size: 9px; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      z-index: 2; transition: all 0.15s ease; line-height: 1;
    }
    .voice-cancel-btn.visible { display: flex; }
    .voice-cancel-btn:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }

    /* Spin */
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Utility */
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* Mobile */
    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .messages-area { padding: 16px 12px; }
      .input-bar { padding: 12px 14px; }
      .brand-sub, .status-pill { display: none; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#e8a030"/>
          <path d="M18 9v18M9 18h18" stroke="#0d1b2a" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">MediAssist</div>
        <div class="brand-sub">Your personal health companion</div>
      </div>
    </div>
    <div class="header-controls">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="english">EN</button>
        <button class="lang-btn" data-lang="twi">TWI</button>
      </div>
      <div class="status-pill connecting" id="status-pill">
        <span class="status-pip"></span>
        <span id="status-label">Connecting…</span>
      </div>
    </div>
  </header>

  <!-- ── Messages ── -->
  <main class="messages-area" id="messages-area">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" stroke="#2e4057" stroke-width="2"/>
        <path d="M32 18v28M18 32h28" stroke="#e8a030" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h2 class="empty-title">How can I help you today?</h2>
      <p class="empty-desc">Ask about your medications, dosages, or schedule — by voice or text.</p>
      <div class="suggestion-chips">
        <button class="chip" data-query="What do I take today?">What do I take today?</button>
        <button class="chip" data-query="When is my next paracetamol?">When is my next paracetamol?</button>
        <button class="chip" data-query="Show all my prescriptions">Show all my prescriptions</button>
      </div>
    </div>
  </main>

  <!-- ── Input bar ── -->
  <footer class="input-bar">
    <div class="input-wrap">
      <textarea id="text-input" rows="1" placeholder="Ask about your medications…"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- Voice button -->
    <div class="voice-btn-wrap">
      <div class="voice-ring" id="voice-ring"></div>
      <div class="voice-ring-idle" id="voice-ring-idle"></div>
      <button id="voice-btn" disabled aria-label="Start voice recording">
        <!-- icon swapped by JS -->
      </button>
      <button class="voice-cancel-btn" id="voice-cancel-btn" aria-label="Cancel recording">✕</button>
      <span class="voice-rec-label" id="voice-rec-label">
        <span class="rec-dot"></span> REC
      </span>
    </div>
  </footer>

</div>

<!-- SVG icon templates (hidden) -->
<svg style="display:none">
  <symbol id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="2" width="6" height="12" rx="3"/>
    <path d="M5 10a7 7 0 0014 0M12 19v4M8 23h8"/>
  </symbol>
  <symbol id="icon-stop" viewBox="0 0 24 24">
    <!-- bars rendered by JS -->
  </symbol>
  <symbol id="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-play" viewBox="0 0 24 24" fill="none">
    <polygon points="6,4 20,12 6,20" fill="currentColor"/>
  </symbol>
  <symbol id="icon-medi-avatar" viewBox="0 0 32 32" fill="none">
    <rect width="32" height="32" rx="10" fill="#e8a030"/>
    <path d="M16 8v16M8 16h16" stroke="#0d1b2a" stroke-width="3" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-user-avatar" viewBox="0 0 32 32" fill="none">
    <rect width="32" height="32" rx="10" fill="#2e4057"/>
    <circle cx="16" cy="13" r="5" fill="#8fa4b8"/>
    <path d="M6 26c0-5.523 4.477-8 10-8s10 2.477 10 8" stroke="#8fa4b8" stroke-width="2" stroke-linecap="round"/>
  </symbol>
</svg>

<script>


const SOCKET_URL = 'http://localhost:8080/assistant';

// ── State ────────────────────────────────────────
const state = {
  language:    'english',   // 'english' | 'twi'
  connected:   false,
  thinking:    false,
  recording:   false,
  processing:  false,
  messages:    [],
};

// ── DOM refs ─────────────────────────────────────
const $messages    = document.getElementById('messages-area');
const $emptyState  = document.getElementById('empty-state');
const $textInput   = document.getElementById('text-input');
const $sendBtn     = document.getElementById('send-btn');
const $voiceBtn    = document.getElementById('voice-btn');
const $voiceRing   = document.getElementById('voice-ring');
const $voiceIdle   = document.getElementById('voice-ring-idle');
const $cancelBtn   = document.getElementById('voice-cancel-btn');
const $recLabel    = document.getElementById('voice-rec-label');
const $statusPill  = document.getElementById('status-pill');
const $statusLabel = document.getElementById('status-label');
const $langBtns    = document.querySelectorAll('.lang-btn');
const $chips       = document.querySelectorAll('.chip');

// ── Utilities ─────────────────────────────────────
function nanoid() {
  return Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

function fmtTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function svgUse(id) {
  return `<svg><use href="#${id}"/></svg>`;
}

// ── Status pill ────────────────────────────────────
function setStatus(mode, label) {
  $statusPill.className = `status-pill ${mode}`;
  $statusLabel.textContent = label;
}

// ── Language toggle ────────────────────────────────
$langBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    state.language = btn.dataset.lang;
    $langBtns.forEach(b => b.classList.toggle('active', b === btn));
    $textInput.placeholder = state.language === 'twi'
      ? 'Ask about your medications (English or Twi)…'
      : 'Ask about your medications…';
  });
});

// ── Suggestion chips ───────────────────────────────
$chips.forEach(chip => {
  chip.addEventListener('click', () => {
    $textInput.value = chip.dataset.query;
    autoResize($textInput);
    $textInput.focus();
    updateSendBtn();
  });
});

// ── Textarea auto-resize ───────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

$textInput.addEventListener('input', () => {
  autoResize($textInput);
  updateSendBtn();
});

$textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});

function updateSendBtn() {
  $sendBtn.disabled = !$textInput.value.trim() || !state.connected || state.thinking;
}

$sendBtn.addEventListener('click', sendText);

// ── Render helpers ────────────────────────────────
function avatarSVG(role) {
  return `<div class="bubble-avatar">${svgUse(role === 'user' ? 'icon-user-avatar' : 'icon-medi-avatar')}</div>`;
}

function toolTags(tools) {
  if (!tools?.length) return '';
  return tools.map(t =>
    `<span class="tool-tag">${t.replace(/_/g, ' ')}</span>`
  ).join('');
}

function waveformBars(count = 18) {
  return Array.from({ length: count }, (_, i) =>
    `<span class="waveform-bar" style="--i:${i}"></span>`
  ).join('');
}

// ── Append message to DOM ─────────────────────────
function appendMessage(msg) {
  // Hide empty state
  $emptyState.style.display = 'none';

  const row = document.createElement('div');
  row.className = `bubble-row ${msg.role}`;
  row.dataset.id = msg.id;

  let bubbleContent = '';

  if (msg.type === 'audio' && msg.audioData) {
    bubbleContent = `
      <div class="audio-row">
        <button class="audio-play-btn" data-audio="${msg.audioData}" aria-label="Play audio">
          ${svgUse('icon-play')}
        </button>
        <div class="audio-waveform">${waveformBars()}</div>
      </div>
      ${msg.text ? `<p class="bubble-transcript">${escHtml(msg.text)}</p>` : ''}
    `;
  } else {
    bubbleContent = `<p>${escHtml(msg.text)}</p>`;
  }

  const meta = `
    <div class="bubble-meta">
      <span class="bubble-tools">${toolTags(msg.toolsUsed)}</span>
      <span class="bubble-time">${fmtTime(msg.timestamp)}</span>
    </div>
  `;

  const bubble = `
    <div class="bubble ${msg.role}${msg.status === 'error' ? ' error' : ''}">
      ${bubbleContent}
      ${meta}
    </div>
  `;

  if (msg.role === 'user') {
    row.innerHTML = bubble + avatarSVG('user');
  } else {
    row.innerHTML = avatarSVG('assistant') + bubble;
  }

  $messages.appendChild(row);
  scrollToBottom();

  // Wire play buttons
  row.querySelectorAll('.audio-play-btn').forEach(btn => {
    btn.addEventListener('click', () => playBase64Audio(btn.dataset.audio));
  });
}

function showThinking() {
  removeThinking();
  const el = document.createElement('div');
  el.className = 'thinking-bubble';
  el.id = 'thinking-bubble';
  el.innerHTML = `
    ${avatarSVG('assistant')}
    <div class="thinking-dots">
      <span class="thinking-dot"></span>
      <span class="thinking-dot"></span>
      <span class="thinking-dot"></span>
    </div>
  `;
  $messages.appendChild(el);
  scrollToBottom();
}

function removeThinking() {
  document.getElementById('thinking-bubble')?.remove();
}

function scrollToBottom() {
  $messages.scrollTop = $messages.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Audio playback ────────────────────────────────
function playBase64Audio(b64) {
  const binary = atob(b64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'audio/webm' });
  const url  = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.onended = () => URL.revokeObjectURL(url);
  audio.play().catch(console.error);
}

// ── UI enable/disable ──────────────────────────────
function setUIEnabled(enabled) {
  $textInput.disabled = !enabled;
  $voiceBtn.disabled  = !enabled;
  updateSendBtn();
}

// ── Voice button icon management ───────────────────
function setVoiceBtnIcon(mode) {
  // mode: 'idle' | 'recording' | 'processing'
  $voiceBtn.className = mode === 'recording' ? 'recording' : mode === 'processing' ? 'processing' : '';

  if (mode === 'idle') {
    $voiceBtn.innerHTML = svgUse('icon-mic');
    $voiceIdle.style.display = '';
    $voiceRing.style.opacity = '0';
    $recLabel.classList.remove('visible');
    $cancelBtn.classList.remove('visible');
  } else if (mode === 'recording') {
    // CSS-animated bars
    $voiceBtn.innerHTML = `
      <div class="rec-bars">
        ${[0,1,2,3,4].map(i=>`<span class="rec-bar" style="--bi:${i}"></span>`).join('')}
      </div>`;
    $voiceIdle.style.display = 'none';
    $recLabel.classList.add('visible');
    $cancelBtn.classList.add('visible');
  } else {
    // processing
    $voiceBtn.innerHTML = `<svg class="spin"><use href="#icon-spin"/></svg>`;
    $voiceIdle.style.display = 'none';
    $voiceRing.style.opacity = '0';
    $recLabel.classList.remove('visible');
    $cancelBtn.classList.remove('visible');
  }
}

// ── Voice recorder ────────────────────────────────
const recorder = (() => {
  let mediaRecorder = null;
  let chunks        = [];
  let stream        = null;
  let audioCtx      = null;
  let analyser      = null;
  let animFrame     = null;

  function teardown() {
    cancelAnimationFrame(animFrame);
    stream?.getTracks().forEach(t => t.stop());
    stream = null; analyser = null;
    audioCtx?.close().catch(()=>{});
    audioCtx = null;
    $voiceRing.style.opacity = '0';
    $voiceRing.style.transform = 'scale(1)';
  }

  function pollAmplitude() {
    if (!analyser) return;
    const data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);
    const db  = Math.min(100, Math.round(rms * 400));
    const scale   = 1 + (db / 100) * 0.75;
    const opacity = 0.12 + (db / 100) * 0.38;
    $voiceRing.style.transform = `scale(${scale})`;
    $voiceRing.style.opacity   = String(opacity);
    $voiceRing.style.transition = 'transform 0.08s ease, opacity 0.08s ease';
    animFrame = requestAnimationFrame(pollAmplitude);
  }

  async function start() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new AudioContext();
      const src = audioCtx.createMediaStreamSource(stream);
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      src.connect(analyser);

      chunks = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';

      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.start(100);

      pollAmplitude();
      return true;
    } catch (err) {
      console.error('[Recorder] mic denied:', err);
      return false;
    }
  }

  function stop() {
    return new Promise(resolve => {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        teardown(); resolve(null); return;
      }
      mediaRecorder.onstop = async () => {
        teardown();
        const mimeType = mediaRecorder.mimeType || 'audio/webm';
        const blob = new Blob(chunks, { type: mimeType });
        chunks = [];
        if (blob.size === 0) { resolve(null); return; }
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      };
      mediaRecorder.stop();
    });
  }

  function cancel() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    chunks = [];
    teardown();
  }

  return { start, stop, cancel };
})();

// ── Voice button click handler ─────────────────────
$voiceBtn.addEventListener('click', async () => {
  if (state.processing) return;

  if (state.recording) {
    // Stop → encode → send
    state.recording = false;
    state.processing = true;
    setVoiceBtnIcon('processing');

    const base64 = await recorder.stop();
    state.processing = false;

    if (base64 && state.connected) {
      const msg = {
        id:        nanoid(),
        role:      'user',
        type:      'audio',
        text:      `🎙 Voice message (${state.language})`,
        audioData: base64,
        language:  state.language,
        timestamp: new Date(),
      };
      state.messages.push(msg);
      appendMessage(msg);
 
      socket.emit('message', {
        content:  base64,
        type:     'audio',
        language: state.language,
      });
      showThinking();
      state.thinking = true;
      setUIEnabled(false);
    }

    setVoiceBtnIcon('idle');
    if (state.connected) $voiceBtn.disabled = false;

  } else {
    // Start recording
    const ok = await recorder.start();
    if (ok) {
      state.recording = true;
      setVoiceBtnIcon('recording');
    }
  }
});

$cancelBtn.addEventListener('click', e => {
  e.stopPropagation();
  recorder.cancel();
  state.recording = false;
  state.processing = false;
  setVoiceBtnIcon('idle');
  if (state.connected) $voiceBtn.disabled = false;
});

// ── Text send ─────────────────────────────────────
function sendText() {
  const content = $textInput.value.trim();
  if (!content || !state.connected || state.thinking) return;

  const msg = {
    id:        nanoid(),
    role:      'user',
    type:      'text',
    text:      content,
    language:  state.language,
    timestamp: new Date(),
  };
  state.messages.push(msg);
  appendMessage(msg);

  socket.emit('message', {
    content,
    type:     'text',
    language: state.language,
  });

  $textInput.value = '';
  autoResize($textInput);
  updateSendBtn();
  showThinking();
  state.thinking = true;
  setUIEnabled(false);
}

// ── Socket.io ─────────────────────────────────────
const socket = io(SOCKET_URL, {
  transports:          ['websocket'],

});

socket.on('connect', () => {
  state.connected = true;
  setStatus('connected', 'Connected');
  setUIEnabled(true);
  setVoiceBtnIcon('idle');
  $voiceBtn.disabled = false;
});

socket.on('disconnect', () => {
  state.connected = false;
  state.thinking  = false;
  setStatus('disconnected', 'Disconnected');
  setUIEnabled(false);
  removeThinking();
});

socket.on('connect_error', () => {
  setStatus('error', 'Connection error');
});

socket.on('assistant:thinking', () => {
  state.thinking = true;
  showThinking();
  setUIEnabled(false);
});

socket.on('response', payload => {
  removeThinking();
  state.thinking = false;
  setUIEnabled(true);

  const msg = {
    id:        nanoid(),
    role:      'assistant',
    type:      'text',
    text:      payload.text,
    toolsUsed: payload.toolsUsed,
    language:  state.language,
    timestamp: new Date(),
    status:    'done',
  };
  state.messages.push(msg);
  appendMessage(msg);
});

socket.on('assistant:audio', payload => {
  removeThinking();
  state.thinking = false;
  setUIEnabled(true);

  const msg = {
    id:        nanoid(),
    role:      'assistant',
    type:      'audio',
    text:      payload.text,
    audioData: payload.audio,
    language:  state.language,
    timestamp: new Date(),
    status:    'done',
  };
  state.messages.push(msg);
  appendMessage(msg);

  // Auto-play the audio response
  playBase64Audio(payload.audio);
});

socket.on('assistant:error', payload => {
  removeThinking();
  state.thinking = false;
  setUIEnabled(true);

  const msg = {
    id:        nanoid(),
    role:      'assistant',
    type:      'text',
    text:      `⚠️ ${payload.message}`,
    language:  state.language,
    timestamp: new Date(),
    status:    'error',
  };
  state.messages.push(msg);
  appendMessage(msg);
});

// ── Boot ──────────────────────────────────────────
setStatus('connecting', 'Connecting…');
setUIEnabled(false);
setVoiceBtnIcon('idle');
$voiceBtn.innerHTML = svgUse('icon-mic'); // initial icon before connected
</script>
